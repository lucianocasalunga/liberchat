{% extends "base.html" %}

{% block title %}Contatos - LiberChat{% endblock %}

{% block content %}
<div class="h-full w-full bg-gray-50 dark:bg-gray-900 p-4 overflow-y-auto">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold">Contatos</h1>
            <a href="/chat" class="text-yellow-600 hover:text-yellow-700">
                ← Voltar ao chat
            </a>
        </div>

        <!-- Lista de contatos -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
            <div class="text-center text-gray-500 dark:text-gray-400 py-12">
                <p>Nenhum contato ainda</p>
                <p class="text-sm mt-2">Adicione npubs para iniciar conversas</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
